<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falha no Pagamento | Yan Epifanio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #050505;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .box {
      max-width: 480px;
      width: 100%;
      background: #121212;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
    }
    .icon {
      font-size: 64px;
      color: #ff6b6b;
      margin-bottom: 16px;
    }
    h2 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    p {
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    a {
      display: inline-block;
      padding: 14px 32px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      transition: .3s;
      font-size: 16px;
      width: 100%;
      max-width: 280px;
    }
    a:hover {
      background: rgba(255,255,255,0.12);
    }
    a.primary {
      background: #25D366;
      border-color: #25D366;
    }
    a.primary:hover {
      box-shadow: 0 8px 30px rgba(37,211,102,0.3);
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">✕</div>
    <h2>Falha no Pagamento</h2>
    <p>O pagamento não foi concluído. Pode ter sido cancelado ou ocorreu um erro.</p>
    <div class="actions">
      <a href="https://yanepifanio.com.br" class="primary">Tentar novamente</a>
      <a href="https://wa.me/5585996149074?text=Ol%C3%A1%20Yan%2C%20tive%20problemas%20no%20pagamento">Falar com suporte</a>
    </div>
  </div>
</body>
</html>
