<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aguardando Pagamento | Yan Epifanio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MB823YVY9Y"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MB823YVY9Y');
    // Rastrear pagamento pendente
    gtag('event', 'payment_pending', {
      status: 'pending'
    });
  </script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #050505;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .box {
      max-width: 480px;
      width: 100%;
      background: #121212;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
    }
    .loader {
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: #00a650;
      height: 48px;
      width: 48px;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    p { color: rgba(255,255,255,0.7); font-size: 16px; line-height: 1.6; margin-bottom: 8px; }
    .debug { margin-top: 16px; font-size: 13px; color: rgba(255,255,255,0.35); word-break: break-all; }
    .btn-home {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: .2s;
    }
    .btn-home:hover { background: rgba(255,255,255,0.10); color: #fff; }
  </style>
</head>
<body>
  <div class="box">
    <div class="loader"></div>
    <h2>Aguardando Pagamento...</h2>
    <p>Identificamos sua ordem de pagamento.<br>Assim que o pagamento for confirmado, você será redirecionado automaticamente.</p>
    <p style="font-size:14px; color:rgba(255,255,255,0.5);">⏳ Não feche esta página</p>
    <div class="debug" id="debug">Carregando...</div>
    <a href="https://yanepifanio.com.br" class="btn-home">← Voltar para o início</a>
  </div>

  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const paymentId = urlParams.get('payment_id') || urlParams.get('collection_id');
      const debugEl = document.getElementById('debug');

      if (!paymentId) {
        debugEl.textContent = '⚠️ Nenhum ID de pagamento encontrado.';
        return;
      }

      debugEl.textContent = `Aguardando confirmação do pagamento ID: ${paymentId}`;

      let attempts = 0;
      const maxAttempts = 120; // 120 * 3s = 6 minutos

      async function checkStatus() {
        try {
          const response = await fetch(
            `https://mercado-pago-api.yan-dossantos-543.workers.dev/payment_status?payment_id=${encodeURIComponent(paymentId)}`,
            { cache: 'no-store' }
          );

          const raw = await response.text();
          let data;
          try {
            data = JSON.parse(raw);
          } catch (_) {
            debugEl.textContent = '⚠️ Erro ao processar resposta do servidor. Tentando novamente...';
            setTimeout(checkStatus, 5000);
            return;
          }

          if (!response.ok) {
            debugEl.textContent = `⚠️ Erro ${response.status}: ${data.error || 'Falha na consulta'}. Tentando novamente...`;
            setTimeout(checkStatus, 5000);
            return;
          }

          // ✅ Redireciona para sucesso
          if (data.status === 'approved') {
            window.location.href = `/success.html?payment_id=${encodeURIComponent(paymentId)}`;
            return;
          }

          // ❌ Redireciona para falha (incluindo charged_back)
          if (
            data.status === 'rejected' ||
            data.status === 'cancelled' ||
            data.status === 'refunded' ||
            data.status === 'charged_back'
          ) {
            window.location.href = `/failure.html?payment_id=${encodeURIComponent(paymentId)}`;
            return;
          }

          // ⏳ Ainda pendente (in_process, pending, etc.)
          attempts++;
          if (attempts >= maxAttempts) {
            debugEl.textContent = '⏳ O pagamento está demorando mais que o esperado. Você pode verificar manualmente ou tentar novamente.';
            return;
          }

          debugEl.textContent = `Aguardando... (${Math.floor(attempts * 3)}s)`;
          setTimeout(checkStatus, 3000);

        } catch (error) {
          console.error('Erro ao verificar status:', error);
          debugEl.textContent = '⚠️ Erro ao consultar status. Tentando novamente...';
          setTimeout(checkStatus, 5000);
        }
      }

      checkStatus();
    })();
  </script>
</body>
</html>
